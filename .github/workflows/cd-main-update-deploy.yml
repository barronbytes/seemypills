# Generated by Gemini + Claude 🤖
name: Continuous Deployment After Main Branch Update

on:
  workflow_run:
    workflows: ["Automated PR Branch Synchronization"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    # GitHub secrets values mapped to environmental variables
    env:
      SSH_KEY: ${{ secrets.SEEMYPILLS_EC2_SSH_PRIVATE_KEY }}
      HOST_IP: ${{ secrets.SEEMYPILLS_EC2_HOST }}

    steps:
      - name: Configure SSH Credentials For EC2
        run: |
          # Reference standard linux environment variables ($SSH_KEY / $HOST_IP) instead
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST_IP" >> ~/.ssh/known_hosts

      - name: Pull Main Branch Changes Onto EC2
        id: pull
        run: |
          OUTPUT=$(ssh -i ~/.ssh/deploy_key ubuntu@"$HOST_IP" '
            cd ~/seemypills
            BEFORE_SHA=$(git rev-parse HEAD)
            git stash
            git pull origin main
            AFTER_SHA=$(git rev-parse HEAD)
            echo "BEFORE_SHA=$BEFORE_SHA"
            echo "AFTER_SHA=$AFTER_SHA"
          ')
          echo "$OUTPUT"
          BEFORE_SHA=$(echo "$OUTPUT" | grep '^BEFORE_SHA=' | cut -d= -f2)
          AFTER_SHA=$(echo "$OUTPUT" | grep '^AFTER_SHA=' | cut -d= -f2)
          if [ "$BEFORE_SHA" = "$AFTER_SHA" ]; then
            echo "No new changes on main branch. Skipping deployment pipeline."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Deployment Script On EC2
        if: steps.pull.outputs.has_changes == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@"$HOST_IP" \
            "cd ~/seemypills && bash scripts/cd-main-update-deploy.sh"