# Generated by Gemini 🤖
name: Automated PR Branch Synchronization

on:
  pull_request:
    types: [closed]

jobs:
  # --- HANDLES DEVELOP BRANCH SYNC ---
  sync-remote-develop:
    # Runs ONLY if a pull request was successfully merged into the develop branch
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history so git can calculate branch structures

      - name: Configure Git Bot Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Develop Sync Script
        run: bash scripts/sync-develop.sh

  # --- HANDLES MAIN & DEVELOP ALIGNMENT AFTER RELEASE ---
  align-release-branches:
    # Runs ONLY if a release PR was successfully merged into main from develop
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Bot Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Main Sync Script
        run: bash scripts/sync-main.sh

      - name: Run Develop Fast-Forward Script
        run: bash scripts/sync-develop-to-main.sh