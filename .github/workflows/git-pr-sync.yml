# Generated by Gemini 🤖
name: Automated PR Branch Synchronization

on:
  pull_request:
    types: [closed]

jobs:
  # --- FORCE ALIGN REMOTE DEVELOP AFTER PRODUCTION REBASE ---
  force-align-remote-develop:
    # Runs ONLY if a PR was successfully merged into the main branch
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history to allow branch resetting

      - name: Configure Git Bot Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Force Align Remote Develop to Main
        run: |
          # Switch to develop, overwrite its history to match main exactly, and force-push back to GitHub
          git switch develop
          git reset --hard origin/main
          git push origin develop --force